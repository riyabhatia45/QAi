name: Agentic Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly regression at 2:00 AM UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '20'

jobs:
  # ─── Strict Mode (PR / Push to main) ───────────────────────────────
  strict-tests:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests (strict mode)
        env:
          HEAL_MODE: strict
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx playwright test

      - name: Upload healing artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-healing-artifacts
          path: |
            test-results/
            playwright-report/

  # ─── Adaptive Mode (Nightly Regression) ───────────────────────────
  adaptive-tests:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests (adaptive mode)
        env:
          HEAL_MODE: adaptive
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx playwright test

      - name: Upload healing artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adaptive-healing-artifacts
          path: |
            test-results/
            playwright-report/
